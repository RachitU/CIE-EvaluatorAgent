# ─────────────────────────────────────────────
# Opportunity Validation System — Settings
# ─────────────────────────────────────────────

llm:
  model: "openai/qwen3.5-9b"
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"

search:
  # Free key (2,500 searches/month): https://serper.dev
  # Preferred: set via env var SERPER_API_KEY
  # Fallback: hardcode here (not recommended for shared repos)
  serper_api_key: "7090507b409eec1ed11abe2d4d994c41a3899ec5"       # leave blank to use SERPER_API_KEY env var
  results_per_query: 4
  timeout_seconds: 8

conversation:
  # Keep history window small to avoid context overflow on smaller LLMs.
  # Increase if your model supports a larger context window.
  max_history_turns: 8

validation:
  # Maximum turns on a single TIPSC criterion before forcing a verdict.
  max_turns_per_criterion: 3

display:
  console_width: 62

memory:
  storage_path: "./.crewai/memory"
  embedder_model: "all-MiniLM-L6-v2"
  recency_weight: 0.3
  semantic_weight: 0.5
  importance_weight: 0.2
  recency_half_life_days: 30