# ─────────────────────────────────────────────
# Opportunity Validation System — Settings
# ─────────────────────────────────────────────

llm:
  model: "openai/mistralai/mistral-7b-instruct-v0.3"
  base_url: "http://localhost:1234/v1"
  api_key: "lm-studio"
  
search:
  serper_api_key: ""
  results_per_query: 2
  timeout_seconds: 5

conversation:
  max_history_turns: 8

validation:
  max_turns_per_criterion: 3

display:
  console_width: 62

# ── CrewAI automatic memory configuration ─────
memory:
  # Storage path for long-term memory (SQLite) and entity memory (ChromaDB)
  storage_path: ".crewai/memory"
  # Local embedder — no OpenAI key required
  embedder_provider: "sentence-transformer"
  embedder_model: "all-MiniLM-L6-v2"