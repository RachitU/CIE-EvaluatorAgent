# ─────────────────────────────────────────────────────────────────
# settings.yaml — Runtime configuration for the validation system
# Edit this file to change model, search, and display settings.
# Prompts and agent logic live in main.py.
# ─────────────────────────────────────────────────────────────────

llm:
  model:    "openai/bonsai-8b"    # Model identifier passed to CrewAI LLM()
  base_url: "http://localhost:1234/v1"  # LM Studio, Ollama, or OpenAI endpoint
  api_key:  "lm-studio"           # Use your real key for cloud models

search:
  # Prefer setting SERPER_API_KEY as an environment variable.
  # If set here, do not commit this file to a shared repository.
  serper_api_key:    ""

  results_per_query: 3    # Organic results fetched per Serper query
  timeout_seconds:   10   # HTTP timeout for search requests

  # ── IMPORTANT for local/small LLMs ───────────────────────────
  # Models ≤ 8B parameters cannot reliably prioritise injected web
  # context. They treat search snippets as primary signal instead of
  # supporting evidence, which causes:
  #   • Inconsistent GREEN/YELLOW/RED ratings across turns
  #   • Coaching based on irrelevant tech trends from search results
  #   • Schema drift in the final JSON output
  #
  # Set to false when running bonsai-8b, Mistral-7B, LLaMA-8B, etc.
  # Set to true only when using GPT-4o, Claude 3, or similar frontier models.
  enabled_for_local_llm: false

validation:
  # Hard caps on the number of student answers per phase.
  # Increasing these gives more coaching depth but risks hallucination
  # spirals on small local models. Defaults are tuned for bonsai-8b.
  max_prob_turns: 3   # Phase 1 — Problem Definition
  max_tips_turns: 4   # Phase 2 — TIPS Evaluation

display:
  console_width: 62   # Terminal width for horizontal rules and wrapping
