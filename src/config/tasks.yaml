validation_task:
  description: >
    Validate the founder's assumptions and market claims using search.
 
    Founder input:
    {preeval_json}
 
    ---
 
    Your goal: gather just enough search evidence to assess each assumption as
    CONFIRMED, UNCONFIRMED, or CONTRADICTED, and to describe the competitor landscape.
 
    Search budget — MAXIMUM 3 searches total across all assumptions:
    - Combine related assumptions into a single broad query where possible
      (e.g. "IoT predictive maintenance India SME market" covers market size,
      geography, and sector in one go)
    - Do not search each assumption individually if a single query can cover several
    - If you have already found relevant evidence for an assumption from a prior
      search, do NOT search again for that assumption — reuse what you have
    - If search returns nothing, mark the assumption UNCONFIRMED; do not retry
 
    For each assumption, write one sentence stating what was found and the verdict.
    Also write a short competitor landscape paragraph and any market notes.
 
    A separate step will convert your findings to JSON — do NOT produce JSON yourself.
    Stop as soon as you have covered all assumptions (even partially) and the
    competitor landscape. Do not keep searching after your 3-search budget is used.
 
  expected_output: >
    A plain-text research summary: for each assumption, the verdict (CONFIRMED/
    UNCONFIRMED/CONTRADICTED) and one-sentence evidence; a competitor landscape
    paragraph; and market notes relevant to TIPSC scoring.
 


regulatory_task:
  description: >
    Map the startup's geography and industry to applicable regulations.
 
    Founder input:
    {preeval_json}
 
    ---
 
    STEP 1 — Knowledge-based classification:
    Determine if the domain plausibly touches any of these regulated spaces:
    healthcare, finance/fintech, cryptocurrency, data privacy, platform/social,
    consumer safety, employment, food/beverage, AI/synthetic content, or other
    heavily regulated industries.
 
    If NO regulated domain is detected, skip searching and return an empty
    applicable_regulations list immediately.
 
    STEP 2 — If regulated domain detected, search to confirm (max 3 searches):
    - Prefer queries like "[Regulation] [country] 2024 compliance requirements"
    - Check for recent changes (2023+) to any identified regulation
    - Confirm actual compliance burden: HIGH (requires legal/expert team),
      MEDIUM (planned effort by a small team), LOW (standard practice)
    - Identify the key regulatory bodies (RBI, SEBI, MeitY, CERT-In, etc.)
 
    STEP 3 — For each applicable regulation, produce:
    - name: the specific regulation or framework (e.g. "India DPDP Act 2023")
    - jurisdiction: the geography it applies in (e.g. "India", "EU", "Global")
    - compliance_burden: HIGH | MEDIUM | LOW
    - brief_requirement: one sentence — what must this startup do to comply?
 
    If no regulations apply, return applicable_regulations as an empty list.
 
    Return ONLY valid JSON. No markdown. No explanations. No text outside the JSON.
    Every field must be present.
 
    {{
      "target_geography": "...",
      "industry_sector": "...",
      "applicable_regulations": [
        {{
          "name": "...",
          "jurisdiction": "...",
          "compliance_burden": "HIGH|MEDIUM|LOW",
          "brief_requirement": "one sentence"
        }}
      ],
      "regulatory_summary": "one paragraph summarizing the overall regulatory posture",
      "requires_specialist_review": true or false,
      "key_compliance_risks": ["risk 1", "risk 2"]
    }}
 
  expected_output: "Valid JSON matching the RegulatoryOutput schema exactly. No markdown, no extra keys."
 
  
ethics_task:
  description: >
    {ethics_rubric}
 
    ---
 
    Evaluate this idea for ethical concerns:

    {preeval_json}

    ---

    Market Validation Results:
    {validation_context}

    ---
    
    Regulatory Context:
    {regulatory_context}
 
    ---


    Apply the three gates exactly as defined in the rubric above.
    Use ONLY evidence present in the idea, validation results, and regulatory context.
    Do not infer missing facts. Do not block ideas merely because they are in a
    regulated space.
 
    For GATE 2 (LEGAL RISK), use the regulatory context to enrich your verdict:
    - If applicable_regulations includes HIGH-burden items, score YELLOW at minimum
    - If key_compliance_risks exist that block the core business model, consider RED
    - If requires_specialist_review is true, set compliance_flag = true in addition
      to any EthicsOutput logic
    - If no applicable_regulations found, score based on the idea itself alone
 
    Block only if a gate is structurally RED.
 
    Return ONLY valid JSON. No markdown. No explanations. No text outside the JSON.
    Every field must be present.
 
    {{
      "harm_vector": "GREEN|YELLOW|RED",
      "harm_reason": "one sentence explaining the harm verdict",
      "legal_risk": "GREEN|YELLOW|RED",
      "legal_reason": "one sentence explaining the legal verdict (may reference regulatory findings)",
      "problem_solution_integrity": "GREEN|RED",
      "integrity_reason": "one sentence explaining the integrity verdict",
      "ethics_pass": true or false,
      "compliance_flag": true or false,
      "rejection_reason": "one sentence if ethics_pass is false, else empty string"
    }}
 
  expected_output: "Valid JSON matching the EthicsOutput schema exactly. No markdown, no extra keys."

tipsc_task:
  description: >
    {tipsc_rubric}

    ---
    
    Evaluate this idea:

    {preeval_json}

    ---

    Market Validation Research:

    {validation_context}

    ---

    Additional Founder Information:

    {followup_context}
    
    ---
    
    If additional information is provided, use it when scoring TIPSC dimensions.
    
    IMPORTANT RE-EVALUATION RULES

    If followup_context is provided, treat founder answers as new evidence.
    Re-score all affected dimensions from scratch. Do not preserve prior scores.
    Upgrade if evidence strengthens. Downgrade if evidence weakens.
    Recompute overall_readiness and ready_for_dfv after any score change.

    Return ONLY valid JSON in exactly this format. No markdown. No explanations.
    Every field must be present. Use only GREEN, YELLOW, or RED for scores.
    Use only STRONG, MODERATE, or WEAK for overall_readiness.

    {{
      "refined_idea": {{
        "customer_segment": "",
        "qualified_problem": "",
        "consequence": "",
        "proposed_solution": ""
      }},
      "solution_alignment" : "GREEN|YELLOW|RED",
      "tips_validated_metrics": {{
        "timely_factor": "1-sentence justification for T score",
        "importance_metric": "1-sentence justification for I score",
        "profitability_pivot": "1-sentence justification for P score",
        "solvability_constraint": "1-sentence justification for S score"
      }},
      "tips_rag_scores": {{
        "T": "GREEN|YELLOW|RED",
        "I": "GREEN|YELLOW|RED",
        "P": "GREEN|YELLOW|RED",
        "S": "GREEN|YELLOW|RED"
      }},
      "overall_readiness": "STRONG|MODERATE|WEAK",
      "ready_for_dfv": true or false
    }}

  expected_output: "Valid JSON matching the schema exactly. No markdown, no extra keys."


followup_task:
  description: |
    Review the TIPSC evaluation below.

    TIPSC Result:
    {tipsc_json}

    ---

    Prior Follow-Up Q&A (questions already asked and answered — do NOT re-ask these):
    {followup_context}

    ---

    Your task:
    Determine whether additional founder information could materially change 
    any RED or YELLOW score that has not already been addressed in prior Q&A.

    For every YELLOW or RED score not yet covered by prior answers:
 
    1. Identify the exact missing evidence preventing a stronger score.
    2. Ask a question that directly tests the rubric requirement.
    3. Prefer questions about:
       - ability to execute
       - access to resources
       - customer willingness to pay
       - acquisition plans
       - validation evidence

    Do NOT ask about background or experience alone if the rubric can also be
    satisfied through partnerships, hiring, advisors, consultants, or other
    acquisition plans.

    The question must help distinguish between the current score and a higher or lower score.

    Ask at most ONE question total — choose the one most likely to change a score.

    If all YELLOW/RED scores have already been addressed in prior Q&A, or if
    all scores are GREEN, set needs_followup = false and questions = [].
 
    Return ONLY valid JSON. No markdown. No explanations. No text outside the JSON.
 
    {{
      "needs_followup": true,
      "questions": ["Your single most important question here"]
    }}

  expected_output: >
    JSON matching FollowUpOutput schema with needs_followup bool and questions list.
