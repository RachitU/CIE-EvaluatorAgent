tipsc_task:
  description: >
    {tipsc_rubric}

    ---
    Evaluate this idea:

    {preeval_json}

    Additional Founder Information:

    {followup_context}

    # <!-- additional to fix followup questions -->

    If additional information is provided, use it when scoring TIPSC dimensions.
    IMPORTANT RE-EVALUATION RULES

    When founder follow-up information is provided:

    1. Treat the founder answer as new evidence.
    2. Re-evaluate all affected TIPSC dimensions from scratch.
    3. Do NOT preserve previous scores by default.
    4. Founder answers override assumptions.
    5. If the founder answer weakens evidence, downgrade scores.
    6. If the founder answer strengthens evidence, upgrade scores.
    7. The final score may be different from the previous score.
    8. Recompute overall_readiness and ready_for_dfv after updating scores.

    Return ONLY valid JSON in exactly this format:

    {{
      "refined_idea": {{
        "customer_segment": "",
        "qualified_problem": "",
        "consequence": "",
        "proposed_solution": ""
      }},
      "solution_alignment" : "GREEN|YELLOW|RED",
      "tips_validated_metrics": {{
        "timely_factor": "",
        "importance_metric": "",
        "profitability_pivot": "",
        "solvability_constraint": ""
      }},
      "tips_rag_scores": {{
        "T": "GREEN|YELLOW|RED",
        "I": "GREEN|YELLOW|RED",
        "P": "GREEN|YELLOW|RED",
        "S": "GREEN|YELLOW|RED"
      }},
      "tips_coaching": {{
        "T": "",
        "I": "",
        "P": "",
        "S": ""
      }},
      "overall_readiness": "STRONG|MODERATE|WEAK",
      "ready_for_dfv": true or false
    }}

    Rules:
    - Return only JSON.
    - No markdown.
    - No explanations.
    - Every field must be present.

  expected_output: |
    {
      "refined_idea": {
        "customer_segment": "Small manufacturing companies",
        "qualified_problem": "Maintenance data is fragmented across systems",
        "consequence": "Delayed repairs and increased downtime",
        "proposed_solution": "Unified maintenance management platform"
      },

      "solution_alignment": "GREEN",

      "tips_validated_metrics": {
        "timely_factor": "Active daily operational problem",
        "importance_metric": "Downtime directly impacts revenue",
        "profitability_pivot": "B2B SaaS subscription model",
        "solvability_constraint": "Requires ERP integrations"
      },

      "tips_rag_scores": {
        "T": "GREEN",
        "I": "GREEN",
        "P": "YELLOW",
        "S": "YELLOW"
      },

      "overall_readiness": "MODERATE",

      "ready_for_dfv": true
    }

followup_task:
  description: |
    Review the TIPSC evaluation.

    TIPSC Result:
    {tipsc_json}

   
    Determine whether additional founder information could materially change any RED or YELLOW score.

    For every YELLOW or RED score:

    1. Identify the exact missing evidence preventing a stronger score.
    2. Ask a question that directly tests the rubric requirement.
    3. Prefer questions about:
      - ability to execute,
      - access to resources,
      - customer willingness to pay,
      - acquisition plans,
      - validation evidence.

    Do NOT ask about background or experience alone if the rubric can also be satisfied through partnerships, hiring, advisors, consultants, or other acquisition plans.

    The question must help distinguish between the current score and a higher or lower score.

    Ask at most ONE question.

    Choose the question most likely to change a TIPSC score.

    Rules:
    - If no question is needed:
      needs_followup = false
      questions = []

    Return ONLY valid JSON:

    {{
      "needs_followup": true,
      "questions": ["..."]
    }}

  expected_output: >
    JSON matching FollowUpOutput schema.
