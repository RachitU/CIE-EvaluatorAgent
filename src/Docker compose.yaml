version: "3.9"

services:

  # ── Zookeeper (Kafka needs this) ─────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: cie-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - cie-network

  # ── Kafka Broker ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cie-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"       # for your app running on host (localhost:9092)
      - "29092:29092"     # for services inside docker network
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners:
      # PLAINTEXT       → used by other docker containers (kafka:29092)
      # PLAINTEXT_HOST  → used by your app on the host machine (localhost:9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"   # we create topics explicitly below
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_MESSAGE_MAX_BYTES: 10485760           # 10MB — TIPSC JSON outputs can be large
      KAFKA_MAX_POLL_INTERVAL_MS: 600000          # 10 min — matches LLM processing time
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - cie-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # ── Topic Initializer (runs once, creates all topics) ────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cie-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      kafka-topics --bootstrap-server kafka:29092 --list

      echo 'Creating topics...'

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.requests \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.answers \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.questions \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.results \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.status \
        --partitions 3 \
        --replication-factor 1

      kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists \
        --topic cie.eval.errors \
        --partitions 3 \
        --replication-factor 1

      echo 'All topics created!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    networks:
      - cie-network

  # ── Kafka UI (visual dashboard) ──────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cie-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: cie-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - cie-network

# ── Volumes ──────────────────────────────────────────────────
volumes:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:

# ── Network ──────────────────────────────────────────────────
networks:
  cie-network:
    driver: bridge