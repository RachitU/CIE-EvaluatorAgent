# ─────────────────────────────────────────────────────────────────
# UI Strings — all user-facing text outside of agent prompts
# ─────────────────────────────────────────────────────────────────

startup:
  intro: |
    This system helps you validate your startup idea in three stages.

    STAGE 1 — Problem Definition
      Clarify: Problem · Customer · Consequence
      (Optional: Assumptions)
    STAGE 2 — TIPS Evaluation
      T (Timely) · I (Important) · P (Profitable) · S (Solvable)

    STAGE 3 — Idea Check
      Quick sanity check on your proposed solution

  search_enabled:  "  ✓  Web search enabled — results will be injected as live context"
  search_disabled: "  ⚠  SERPER_API_KEY not set — agents will evaluate without web data"

phases:
  problem_header:   "STAGE 1 — PROBLEM DEFINITION"
  problem_running:  "  Analysing your problem...\n"
  tips_header:      "STAGE 2 — TIPS EVALUATION"
  tips_running:     "  Running TIPS evaluation...\n"
  idea_header:      "STAGE 3 — IDEA CHECK"
  idea_running:     "  Checking your solution...\n"

transitions:
  problem_complete: |
    Great — your problem is defined. Now let's evaluate the opportunity.
  tips_complete: |
    TIPS evaluation complete. Now describe the solution you want to build.
  final_status: |
    All three stages complete. Your idea is ready for DFV analysis.

prompts:
  problem_input:   "Describe the problem you want to solve (don't worry about format — just explain it):"
  solution_input:  "Describe the solution you want to build:"
  response_input:  "Your response:"

agent_display:
  asking_label:      "AGENT IS ASKING:"
  fallback_question: "Can you tell me more about the problem you want to solve?"

section_titles:
  main:         "STARTUP IDEA VALIDATION SYSTEM"
  prob_complete: "PROBLEM DEFINED"
  tips_complete: "TIPS EVALUATION COMPLETE"
  idea_approved: "IDEA APPROVED"
  final:        "VALIDATION COMPLETE — READY FOR DFV"

report_labels:
  problem:     "PROBLEM DEFINITION"
  tips:        "TIPS EVALUATION"
  solution:    "PROPOSED SOLUTION"
  idea:        "IDEA CHECK"
  json_output: "STRUCTURED OUTPUT (passes to DFV)"

traffic_lights:
  GREEN:  "🟢 GREEN"
  YELLOW: "🟡 YELLOW"
  RED:    "🔴 RED"
  "UNKNOWN": "⚪ UNKNOWN"

force_close_template: |
  ⚠ MANDATORY OVERRIDE — CRITERION MUST CLOSE NOW

  You have spent {turns} turns on {name} ({criterion}).
  The student has already provided reasonable information.

  YOU MUST:
    1. Assign GREEN, YELLOW, or RED based on what you have.
    2. Close this criterion immediately.
    3. Move to the next unresolved criterion.
    4. Do NOT ask another question about {criterion}.

repetition_warning: |
  ⚠ WARNING: Do not repeat a question you already asked.
  If the student gave a reasonable answer, accept it and move on.
  Assign a score and close the criterion.

web_context:
  header:    "WEB SEARCH CONTEXT  [{label}]  (fetched {date})"
  separator: "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  footer: |
    Use the search data above to ground your evaluation.
    Reference specific findings in your response where relevant.
  no_results:  "  (no results found)"
  search_off:  "  (web search not configured)"
  error:       "  (search error: {error})"