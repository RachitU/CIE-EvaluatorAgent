# ─────────────────────────────────────────────────────────────────
# UI Strings — all user-facing text outside of agent prompts
# ─────────────────────────────────────────────────────────────────

startup:
  intro: |
    This system determines whether your problem is worth solving
    and whether your proposed solution is a valid response.

    PHASE 1 — Opportunity Evaluation
      TIPSC  (Timely · Important · Profitable · Solvable · Contextual)
      Need Validation
     

    PHASE 2 — Idea Evaluation
      PSEA   (Problem-Solution Fit · Simplicity · Ethics · Assumptions)
      Initial Feasibility

  search_enabled:  "  ✓  Web search enabled — results will be injected as live context"
  search_disabled: "  ⚠  SERPER_API_KEY not set — agents will evaluate without web data"

phases:
  opportunity_header: "PHASE 1 — OPPORTUNITY EVALUATION"
  opportunity_running: "  Running TIPSC triage...\n"
  idea_header:         "PHASE 2 — IDEA EVALUATION"
  idea_running:        "  Running PSEA evaluation...\n"

transitions:
  opportunity_approved: |
    Your opportunity has been validated. Well done.
    Now describe the solution you propose to build.
  final_status: |
    Both opportunity and solution have passed validation.
    Proceed to Desirability, Feasibility, and Viability (DFV) analysis.

prompts:
  problem_input:  "Describe the problem you want to solve:"
  solution_input: "Describe your proposed solution:"
  response_input: "Your response:"

agent_display:
  asking_label:   "AGENT IS ASKING:"
  fallback_question: "Please share more information to continue the evaluation."

section_titles:
  main:       "ENTREPRENEURIAL OPPORTUNITY VALIDATION SYSTEM"
  opp_valid:  "OPPORTUNITY VALIDATED"
  final:      "VALIDATION COMPLETE — FINAL REPORT"
  dfv_ready:  "STATUS: READY FOR DFV EVALUATION"

report_labels:
  problem:     "PROBLEM STATEMENT"
  opportunity: "OPPORTUNITY EVALUATION"
  solution:    "PROPOSED SOLUTION"
  idea:        "IDEA EVALUATION"

force_close_template: |
  ⚠ MANDATORY OVERRIDE — CRITERION MUST CLOSE NOW

  You have spent {turns} turns investigating {name} ({criterion}).

  The founder has already provided reasonable evidence.

  Perfect certainty is NOT required at this stage.

  YOU MUST:

    1. Accept the founder's evidence as sufficient.
    2. Assign:
       - Strong
       - Weak
       - Unclear
       - Accepted Risk
    3. Close this criterion immediately.
    4. Move to the next unresolved criterion.
    5. Do NOT ask another question about this criterion.

  Continuing to investigate this criterion is a validation error.

repetition_warning: |
  ⚠ WARNING: You are repeating yourself.

  Do NOT ask another variation of the same question.

  If the founder has already provided a reasonable answer:

    1. Accept the answer.
    2. Assign Strong, Weak, Unclear, or Accepted Risk.
    3. Close the criterion.
    4. Move to the next unresolved criterion.

  Repeated questioning is a validation error.
  
web_context:
  header:    "WEB SEARCH CONTEXT  [{label}]  (fetched {date})"
  separator: "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  footer: |
    Use the search data above to ground your evaluation in current
    real-world evidence. Reference specific findings in your response.
  no_results:  "  (no results found)"
  search_off:  "  (web search not configured)"
  error:       "  (search error: {error})"
