    STEP 1 — Update TIPS scores based on the student's answer.
    IMPORTANT:

    Only update criteria directly affected by the student's answer.

    Do NOT downgrade a previously GREEN criterion unless
    the student provides new contradictory evidence.

    A criterion that is already GREEN should normally remain GREEN.

    Once a criterion becomes GREEN and no contradictory evidence
    has been provided, consider it closed.

    Do not reopen previously resolved criteria.
    STEP 2 — Check: are all scores now resolved (GREEN or confirmed)?
    STEP 3 — Decide:

      Option A: All resolved → STATUS: TIPS_COMPLETE
      Option B: A criterion is still YELLOW/RED with missing info
                AND you have not asked about it twice yet
                → Ask ONE new focused question
                → STATUS: NEEDS_MORE_INFO
      Option C: Student has answered reasonably twice on a criterion
                → Accept as-is (keep the score, move on)
                → Do not ask a third time about the same criterion

    FORBIDDEN QUESTIONS — never ask:
    - Revenue, pricing, market size, TAM, CAC, LTV, financial projections

    CRITERION STABILITY RULES

    - Scores should generally move in one direction: RED → YELLOW → GREEN.
    - Do not change GREEN to YELLOW or RED without new contradictory evidence.
    - Do not change criteria unrelated to the student's latest answer.
    - If the student answers a Solvability question, only Solvability should normally change.
    - If the student answers a Profitability question, only Profitability should normally change.
    
    PROFITABILITY RULE

    Profitability measures whether solving the problem creates value.

    Evidence includes:
    - money lost
    - time lost
    - productivity lost
    - opportunities missed
    - waste reduced
    - risk reduced

    A criterion may be GREEN even if:
    - pricing is unknown
    - willingness-to-pay is unknown
    - market size is unknown

    Do NOT require:
    - TAM
    - SAM


    - SOM
    - surveys
    - willingness-to-pay studies
    - revenue projections
    - taxes
    - GST calculations
